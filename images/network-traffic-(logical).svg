<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1060" width="100%" preserveAspectRatio="xMidYMid meet" style="max-width:1200px;height:auto;font-family:'Segoe UI',Arial,sans-serif;background:#ffffff" role="img" aria-labelledby="t d">
  <title id="t">Logical network traffic flow</title>
  <desc id="d">All outbound and inbound network connections made by lib/main.dart, lib/pia_service.dart and lib/router_push.dart: HTTPS API/token/CA-cert calls, TCP 1337 latency probes, cert-pinned HTTPS 1337 key registration, UDP 51820 WireGuard tunnel, SSH 22 router push, DNS resolution and browser-launched links, plus VPN egress through the PIA public IP pool.</desc>

  <defs>
    <style>
      .zt{font:700 14px 'Segoe UI',Arial,sans-serif}
      .nt{font:700 14px 'Segoe UI',Arial,sans-serif;fill:#102027}
      .ns{font:12px 'Segoe UI',Arial,sans-serif;fill:#455A64}
      .lb{font:12px 'Segoe UI',Arial,sans-serif}
      .lbg{fill:#ffffff;fill-opacity:.85}
      .flow{fill:none;stroke-width:2.6}
      .ret{fill:none;stroke-width:1.9;stroke-dasharray:7 5}
    </style>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1E88E5"/></marker>
    <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#FF9800"/></marker>
    <marker id="ap" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#9C27B0"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#4CAF50"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#F44336"/></marker>
    <marker id="ay" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#9E9E9E"/></marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="650" y="34" text-anchor="middle" style="font:700 24px 'Segoe UI',Arial,sans-serif;fill:#102027">Logical network traffic flow</text>
  <text x="650" y="58" text-anchor="middle" style="font:13px 'Segoe UI',Arial,sans-serif;fill:#607D8B">Every endpoint, port &amp; protocol extracted from lib/main.dart · lib/pia_service.dart · lib/router_push.dart  ·  solid = outbound request, dashed = inbound response / optional</text>
  <text x="650" y="76" text-anchor="middle" style="font:11px 'Segoe UI',Arial,sans-serif;fill:#9E9E9E">
  <tspan font-weight="bold">Note:</tspan> All IP addresses shown are for illustration only.
</text>

  <!-- ===================== ZONES ===================== -->
  <!-- Local Network -->
  <rect x="30" y="90" width="320" height="720" rx="14" fill="#E3F2FD" fill-opacity="0.35" stroke="#90CAF9" stroke-dasharray="6 5"/>
  <text x="46" y="112" class="zt" fill="#1565C0">Local Network (192.168.1.0/24)</text>

  <!-- PIA Infrastructure -->
  <rect x="460" y="90" width="410" height="470" rx="14" fill="#F3E5F5" fill-opacity="0.30" stroke="#CE93D8" stroke-dasharray="6 5"/>
  <text x="476" y="112" class="zt" fill="#6A1B9A">PIA Infrastructure</text>

  <!-- Internet Services / CDN / DNS -->
  <rect x="460" y="585" width="410" height="345" rx="14" fill="#ECEFF1" fill-opacity="0.55" stroke="#B0BEC5" stroke-dasharray="6 5"/>
  <text x="476" y="607" class="zt" fill="#455A64">Internet Services · CDN · DNS</text>

  <!-- PIA VPN exit + Internet -->
  <rect x="900" y="100" width="385" height="690" rx="14" fill="#E8F5E9" fill-opacity="0.35" stroke="#A5D6A7" stroke-dasharray="6 5"/>
  <text x="916" y="122" class="zt" fill="#2E7D32">PIA VPN Exit &amp; Internet</text>

  <!-- ===================== LOCAL NODES ===================== -->
  <!-- Device -->
  <rect x="70" y="140" width="240" height="160" rx="12" fill="#ffffff" stroke="#1E88E5" stroke-width="2"/>
  <rect x="88" y="150" width="32" height="56" rx="6" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5"/>
  <rect x="92" y="158" width="24" height="40" fill="#BBDEFB"/>
  <line x1="100" y1="201" x2="108" y2="201" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="130" y="166" class="nt">📱 Device (this app)</text>
  <text x="82" y="232" class="ns">192.168.1.100</text>
  <text x="82" y="252" class="ns">WG tunnel iface: 10.0.1.2/32</text>
  <text x="82" y="272" class="ns">via Dart HttpClient / dart:io</text>
  <text x="82" y="290" class="ns">cfg DNS: 9.9.9.9, 149.112.112.112</text>

  <!-- LAN switch -->
  <rect x="60" y="410" width="110" height="55" rx="8" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="115" y="434" text-anchor="middle" class="nt" style="font-size:13px">LAN switch</text>
  <text x="115" y="452" text-anchor="middle" class="ns">192.168.1.0/24</text>

  <!-- Router (jagged top) -->
  <path d="M70,575 L70,730 L310,730 L310,575 L295,565 L280,575 L265,565 L250,575 L235,565 L220,575 L205,565 L190,575 L175,565 L160,575 L145,565 L130,575 L115,565 L100,575 L85,565 Z" fill="#ffffff" stroke="#F44336" stroke-width="2"/>
  <text x="84" y="600" class="nt">⛂ Router — ASUS Merlin</text>
  <text x="84" y="624" class="ns">192.168.1.1</text>
  <text x="84" y="642" class="ns">(app field default 192.168.0.254)</text>
  <text x="84" y="664" class="ns">SSH server :22 · nvram / wg / service</text>
  <text x="84" y="686" class="ns">WireGuard client slots wgc1–wgc5</text>
  <text x="84" y="708" class="ns">reads wgcN_rip = pool public IP</text>

  <!-- ===================== PIA INFRA NODES (cylinders) ===================== -->
  <!-- serverlist -->
  <path d="M500,147 A165,12 0 0 1 830,147 L830,208 A165,12 0 0 1 500,208 Z" fill="#ffffff" stroke="#1E88E5" stroke-width="2"/>
  <ellipse cx="665" cy="147" rx="165" ry="12" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
  <text x="665" y="166" text-anchor="middle" class="nt" style="font-size:13px">serverlist.piaservers.net</text>
  <text x="665" y="184" text-anchor="middle" class="ns">e.g. 160.79.104.10 : 443  (HTTPS)</text>
  <text x="665" y="200" text-anchor="middle" class="ns">GET /vpninfo/servers/v6</text>

  <!-- token -->
  <path d="M500,262 A165,12 0 0 1 830,262 L830,323 A165,12 0 0 1 500,323 Z" fill="#ffffff" stroke="#1E88E5" stroke-width="2"/>
  <ellipse cx="665" cy="262" rx="165" ry="12" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
  <text x="665" y="281" text-anchor="middle" class="nt" style="font-size:13px">www.privateinternetaccess.com</text>
  <text x="665" y="299" text-anchor="middle" class="ns">e.g. 104.18.30.10 : 443  (HTTPS)</text>
  <text x="665" y="315" text-anchor="middle" class="ns">POST /gtoken/generateToken · Basic Auth</text>

  <!-- WG servers -->
  <path d="M500,387 A165,12 0 0 1 830,387 L830,503 A165,12 0 0 1 500,503 Z" fill="#ffffff" stroke="#7B1FA2" stroke-width="2"/>
  <ellipse cx="665" cy="387" rx="165" ry="12" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="665" y="406" text-anchor="middle" class="nt" style="font-size:13px">PIA WireGuard servers</text>
  <text x="665" y="424" text-anchor="middle" class="ns">e.g. 143.244.50.40  (CN-pinned)</text>
  <text x="665" y="442" text-anchor="middle" class="ns">: 1337  TCP probe + HTTPS /addKey</text>
  <text x="665" y="460" text-anchor="middle" class="ns">: 51820  UDP WireGuard tunnel</text>
  <text x="665" y="478" text-anchor="middle" class="ns">: 51820 UDP (router tunnel after push)</text>
  <text x="665" y="496" text-anchor="middle" class="ns">CA pin: pia-foss ca.rsa.4096.crt</text>

  <!-- ===================== INTERNET SERVICES NODES ===================== -->
  <!-- raw.githubusercontent -->
  <path d="M500,632 A165,12 0 0 1 830,632 L830,688 A165,12 0 0 1 500,688 Z" fill="#ffffff" stroke="#1E88E5" stroke-width="2"/>
  <ellipse cx="665" cy="632" rx="165" ry="12" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
  <text x="665" y="651" text-anchor="middle" class="nt" style="font-size:13px">raw.githubusercontent.com (GitHub CDN)</text>
  <text x="665" y="669" text-anchor="middle" class="ns">e.g. 185.199.108.133 : 443</text>
  <text x="665" y="684" text-anchor="middle" class="ns">GET /pia-foss/.../ca.rsa.4096.crt</text>

  <!-- DNS -->
  <rect x="500" y="730" width="330" height="70" rx="10" fill="#ffffff" stroke="#9E9E9E" stroke-width="2"/>
  <text x="665" y="752" text-anchor="middle" class="nt" style="font-size:13px">DNS resolver (OS-level)</text>
  <text x="665" y="770" text-anchor="middle" class="ns">resolves PIA / GitHub hostnames</text>
  <text x="665" y="788" text-anchor="middle" class="ns">UDP/TCP 53 · cfg points to Quad9 9.9.9.9</text>

  <!-- Browser links -->
  <rect x="500" y="835" width="330" height="70" rx="10" fill="#ffffff" stroke="#1E88E5" stroke-width="2"/>
  <text x="665" y="857" text-anchor="middle" class="nt" style="font-size:13px">Web links via url_launcher (OS browser)</text>
  <text x="665" y="875" text-anchor="middle" class="ns">exponentiallydigital.com · github.com</text>
  <text x="665" y="893" text-anchor="middle" class="ns">HTTPS : 443 (delegated to system browser)</text>

  <!-- ===================== VPN EXIT / INTERNET ===================== -->
  <!-- PIA internal network -->
  <rect x="925" y="150" width="340" height="125" rx="10" fill="#ffffff" stroke="#43A047" stroke-width="2"/>
  <text x="1095" y="174" text-anchor="middle" class="nt" style="font-size:13px">PIA internal network</text>
  <text x="1095" y="194" text-anchor="middle" class="ns">172.16.0.0/16</text>
  <rect x="965" y="208" width="260" height="52" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="1095" y="228" text-anchor="middle" class="ns">server tunnel iface (peer)</text>
  <text x="1095" y="247" text-anchor="middle" class="nt" style="font-size:13px;fill:#2E7D32">172.16.1.50</text>

  <!-- Public IP pool (stacked rectangles) -->
  <text x="1090" y="332" text-anchor="middle" class="zt" fill="#2E7D32">PIA Public IP Pool</text>
  <rect x="995" y="350" width="210" height="66" rx="8" fill="#C8E6C9" stroke="#43A047" stroke-width="1.5"/>
  <rect x="982" y="365" width="210" height="66" rx="8" fill="#A5D6A7" stroke="#43A047" stroke-width="1.5"/>
  <rect x="969" y="380" width="210" height="66" rx="8" fill="#81C784" stroke="#2E7D32" stroke-width="1.8"/>
  <text x="1074" y="408" text-anchor="middle" class="nt" style="font-size:13px">egress src IP (NAT)</text>
  <text x="1074" y="427" text-anchor="middle" class="ns" style="fill:#1B5E20">185.230.125.10 – 185.230.125.50</text>

  <!-- Internet cloud -->
  <g transform="translate(948,572) scale(1.45)">
    <path d="M 50 100 C 20 100 10 80 28 66 C 18 44 44 28 64 40 C 72 18 110 18 120 40 C 150 30 172 54 156 74 C 178 84 168 100 146 100 Z" fill="#ffffff" stroke="#2E7D32" stroke-width="1.6"/>
  </g>
  <text x="1085" y="660" text-anchor="middle" class="nt" style="font-size:14px">☁ Internet</text>
  <text x="1085" y="681" text-anchor="middle" class="ns">any destination</text>
  <text x="1085" y="699" text-anchor="middle" class="ns">sees source 185.230.125.x</text>

  <!-- ===================== FLOWS ===================== -->
  <!-- 1 serverlist HTTPS 443 -->
  <path class="flow" stroke="#1E88E5" marker-end="url(#ab)" d="M310,158 Q400,150 500,176"/>
  <path class="ret"  stroke="#1E88E5" marker-end="url(#ab)" d="M500,196 Q405,206 312,170"/>
  <g><rect class="lbg" x="316" y="113" width="244" height="18" rx="4"/><text x="320" y="126" class="lb" fill="#1565C0">HTTPS 443 — GET /vpninfo/servers/v6</text></g>

  <!-- 2 token HTTPS 443 POST -->
  <path class="flow" stroke="#1E88E5" marker-end="url(#ab)" d="M310,182 Q405,238 500,290"/>
  <path class="ret"  stroke="#1E88E5" marker-end="url(#ab)" d="M500,310 Q400,300 312,200"/>
  <g><rect class="lbg" x="332" y="241" width="246" height="18" rx="4"/><text x="336" y="254" class="lb" fill="#1565C0">HTTPS 443 — POST generateToken (Basic)</text></g>

  <!-- 3 latency probes TCP 1337 (x N) -->
  <path class="flow" stroke="#FF9800" stroke-width="1.2" opacity="0.55" d="M310,200 Q415,318 500,404"/>
  <path class="flow" stroke="#FF9800" stroke-width="1.2" opacity="0.55" d="M310,212 Q430,346 500,432"/>
  <path class="flow" stroke="#FF9800" marker-end="url(#ao)" d="M310,206 Q420,330 500,418"/>
  <g><rect class="lbg" x="336" y="361" width="214" height="18" rx="4"/><text x="340" y="374" class="lb" fill="#E65100">TCP 1337 × N — latency probes</text></g>

  <!-- 4 key registration HTTPS 1337 cert-pinned -->
  <path class="flow" stroke="#9C27B0" marker-end="url(#ap)" d="M310,226 Q420,372 500,448"/>
  <path class="ret"  stroke="#9C27B0" marker-end="url(#ap)" d="M500,470 Q400,408 312,244"/>
  <g><rect class="lbg" x="332" y="409" width="240" height="18" rx="4"/><text x="336" y="422" class="lb" fill="#6A1B9A">HTTPS 1337 — GET /addKey (cert-pinned)</text></g>
  <g><rect class="lbg" x="356" y="487" width="232" height="18" rx="4"/><text x="360" y="500" class="lb" fill="#6A1B9A">⇠ peer_ip · server_key · server_port</text></g>

  <!-- 5 WireGuard tunnel UDP 51820 (device) -->
  <path class="flow" stroke="#4CAF50" marker-end="url(#ag)" d="M310,252 Q420,400 500,486"/>
  <path class="ret"  stroke="#4CAF50" marker-end="url(#ag)" d="M500,500 Q405,402 312,270"/>
  <g><rect class="lbg" x="330" y="520" width="226" height="18" rx="4"/><text x="334" y="533" class="lb" fill="#2E7D32">UDP 51820 — WireGuard tunnel ⇄</text></g>

  <!-- 6 CA cert HTTPS 443 -->
  <path class="flow" stroke="#1E88E5" marker-end="url(#ab)" d="M310,274 Q372,470 500,652"/>
  <path class="ret"  stroke="#1E88E5" marker-end="url(#ab)" d="M500,672 Q360,500 312,288"/>
  <g><rect class="lbg" x="318" y="566" width="220" height="18" rx="4"/><text x="322" y="579" class="lb" fill="#1565C0">HTTPS 443 — GET ca.rsa.4096.crt</text></g>

  <!-- 7 DNS 53 -->
  <path class="flow" stroke="#9E9E9E" marker-end="url(#ay)" d="M310,287 Q360,560 500,762"/>
  <g><rect class="lbg" x="316" y="694" width="208" height="18" rx="4"/><text x="320" y="707" class="lb" fill="#616161">DNS 53 — resolve hostnames</text></g>

  <!-- 8 browser links HTTPS 443 (optional/delegated) -->
  <path class="ret" stroke="#1E88E5" marker-end="url(#ab)" d="M310,298 Q360,650 500,866"/>
  <g><rect class="lbg" x="316" y="784" width="230" height="18" rx="4"/><text x="320" y="797" class="lb" fill="#1565C0">HTTPS 443 — url_launcher (browser)</text></g>

  <!-- 9 SSH 22 device -> router -->
  <path class="flow" stroke="#F44336" marker-end="url(#ar)" d="M232,300 L232,558"/>
  <path class="ret"  stroke="#F44336" marker-end="url(#ar)" d="M252,558 L252,300"/>
  <g><rect class="lbg" x="120" y="424" width="98" height="18" rx="4"/><text x="124" y="437" class="lb" fill="#C62828">SSH 22 (TCP)</text></g>
  <g><rect class="lbg" x="258" y="452" width="70" height="18" rx="4"/><text x="262" y="465" class="lb" fill="#C62828">⇠ stdout</text></g>

  <!-- LAN structural links (no arrowheads) -->
  <path d="M150,300 L115,410" stroke="#B0BEC5" stroke-width="1.6"/>
  <path d="M115,465 L150,560" stroke="#B0BEC5" stroke-width="1.6"/>

  <!-- Router establishes its own WG tunnel after push -->
  <path class="ret" stroke="#4CAF50" marker-end="url(#ag)" d="M312,600 Q410,548 500,500"/>
  <g><rect class="lbg" x="330" y="552" width="262" height="18" rx="4"/><text x="334" y="565" class="lb" fill="#2E7D32">UDP 51820 — router tunnel (after push)</text></g>

  <!-- ===================== EGRESS CHAIN ===================== -->
  <!-- WG server -> PIA internal peer -->
  <path class="flow" stroke="#4CAF50" marker-end="url(#ag)" d="M830,448 Q890,330 925,214"/>
  <g><rect class="lbg" x="840" y="318" width="206" height="18" rx="4"/><text x="844" y="331" class="lb" fill="#2E7D32">WG peer ⇄ UDP 51820 → 172.16.1.50</text></g>

  <!-- PIA internal -> pool (source NAT) -->
  <path class="flow" stroke="#4CAF50" marker-end="url(#ag)" d="M1090,275 L1090,346"/>
  <g><rect class="lbg" x="1098" y="302" width="118" height="18" rx="4"/><text x="1102" y="315" class="lb" fill="#2E7D32">source NAT (pool)</text></g>

  <!-- pool -> internet (encrypted egress to any dest) -->
  <path class="ret" stroke="#4CAF50" marker-end="url(#ag)" d="M1080,446 L1085,596"/>
  <g><rect class="lbg" x="930" y="512" width="276" height="18" rx="4"/><text x="934" y="525" class="lb" fill="#2E7D32">UDP 51820 (encrypted) → any dest · src 185.230.125.x</text></g>

  <!-- ===================== LEGEND ===================== -->
  <rect x="30" y="948" width="1255" height="98" rx="12" fill="#FAFAFA" stroke="#CFD8DC"/>
  <text x="46" y="972" class="zt" fill="#37474F">Legend — protocol colours &amp; line styles</text>

  <!-- row 1 -->
  <line x1="50" y1="996" x2="92" y2="996" stroke="#1E88E5" stroke-width="2.6" marker-end="url(#ab)"/>
  <text x="100" y="1000" class="lb" fill="#37474F">HTTPS 443 / 1337 — API, token, CA cert</text>

  <line x1="370" y1="996" x2="412" y2="996" stroke="#FF9800" stroke-width="2.6" marker-end="url(#ao)"/>
  <text x="420" y="1000" class="lb" fill="#37474F">TCP 1337 — latency probes (× N)</text>

  <line x1="690" y1="996" x2="732" y2="996" stroke="#9C27B0" stroke-width="2.6" marker-end="url(#ap)"/>
  <text x="740" y="1000" class="lb" fill="#37474F">HTTPS 1337 — WG key reg (cert-pinned)</text>

  <line x1="1040" y1="996" x2="1082" y2="996" stroke="#4CAF50" stroke-width="2.6" marker-end="url(#ag)"/>
  <text x="1090" y="1000" class="lb" fill="#37474F">UDP 51820 — WireGuard tunnel</text>

  <!-- row 2 -->
  <line x1="50" y1="1024" x2="92" y2="1024" stroke="#F44336" stroke-width="2.6" marker-end="url(#ar)"/>
  <text x="100" y="1028" class="lb" fill="#37474F">SSH 22 — router push</text>

  <line x1="290" y1="1024" x2="332" y2="1024" stroke="#9E9E9E" stroke-width="2.6" marker-end="url(#ay)"/>
  <text x="340" y="1028" class="lb" fill="#37474F">DNS 53 — name resolution</text>

  <line x1="560" y1="1024" x2="602" y2="1024" stroke="#546E7A" stroke-width="2.6"/>
  <text x="610" y="1028" class="lb" fill="#37474F">solid → outbound request</text>

  <line x1="820" y1="1024" x2="862" y2="1024" stroke="#546E7A" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="870" y="1028" class="lb" fill="#37474F">dashed ⇠ inbound response / optional</text>

  <line x1="1130" y1="1024" x2="1172" y2="1024" stroke="#FFC107" stroke-width="2.6"/>
  <text x="1180" y="1028" class="lb" fill="#9E9E9E">ICMP — not used by app</text>
</svg>
