# JVM memory tuning
#org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=1g -XX:ReservedCodeCacheSize=256m -XX:+UseParallelGC -XX:+UseStringDeduplication -XX:+UseCompressedOops
org.gradle.jvmargs=-Xmx$3g -XX:+UseG1GC -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# Gradle workers
#org.gradle.workers.max=2 # AGP 8.x ignores it and Flutter overrides it anywa

# Build cache
org.gradle.caching=true

# Kotlin compiler memory
kotlin.daemon.jvmargs=-Xmx1g

# Parallel configuration
org.gradle.parallel=true

# Incremental Kotlin
kotlin.incremental=true

# Incremental dexing
#android.enableDexingArtifactTransform=true

# Android build system
android.useAndroidX=true
android.newDsl=false
android.builtInKotlin=false
org.gradle.daemon=true
