name: Package Addon

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without creating a release"
        required: false
        default: "false"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ==========================================
  # JOB 1: SONARQUBE ANALYSIS
  # Runs on main pushes, PRs, tags, and manual triggers
  # ==========================================
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones disabled for better relevancy of analysis

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # Resolves dependencies so SonarQube can accurately map the project
      - name: Fetch Flutter Dependencies
        run: flutter pub get --locked

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # JOB 2: BUILD AND RELEASE
  # ONLY runs when a tag is pushed (v*) or manually dispatched
  # ==========================================
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. SET UP JAVA
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # 2. SET UP FLUTTER
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # 3. DECODE KEYSTORE
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/release.jks
          cat > android/key.properties <<EOF
          storeFile=../release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      # 4. GET DEPENDENCIES & BUILD THE APK
      - name: Build Flutter APK
        run: |
          flutter pub get --enforce-lockfile
          dart run flutter_launcher_icons
          flutter build apk --release

      # 5. INSTALL PANDOC
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      # 6. CREATE STAGING DIRECTORY & GENERATE HTML
      - name: Create addon directory and assets
        run: |
          ADDON="${{ github.event.repository.name }}"
          mkdir -p build/$ADDON

          pandoc README.md -f gfm -t html -s --self-contained -o build/$ADDON/README.html

          cp LICENSE build/$ADDON/
          cp README.md build/$ADDON/

          cp build/app/outputs/flutter-apk/app-release.apk build/$ADDON/pia-wireguard-cfga.apk
          cp build/app/outputs/flutter-apk/app-release.apk.sha1 build/$ADDON/pia-wireguard-cfga.sha1

      # 7. CREATE ZIP ARCHIVE
      - name: Create ZIP
        run: |
          ADDON="${{ github.event.repository.name }}"
          cd build
          zip -r "$ADDON-${GITHUB_REF_NAME}.zip" "$ADDON"

      # 8. DRY RUN NOTICE
      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run completed -- no release was created."

      # 9. UPLOAD TO GITHUB RELEASES
      - name: Upload Release Asset
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ github.event.repository.name }}-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
