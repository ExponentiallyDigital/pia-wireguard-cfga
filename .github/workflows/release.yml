name: "Build and release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without creating a release"
        required: false
        default: "false"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Build and release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then echo "Missing KEYSTORE_BASE64" && exit 1; fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/release.jks
          cat > android/key.properties <<EOF
          storeFile=../release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build Flutter APK
        run: |
          flutter pub get --enforce-lockfile
          dart run flutter_launcher_icons
          flutter build apk --release

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Create release package
        run: |
          ADDON="${{ github.event.repository.name }}"
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p build/$PACKAGE

          # Strip badges and inject version under the README.html title
          grep -v 'img.shields.io\|sonarcloud.io/api/project_badges' README.md \
            | sed "s/^# \(.*\)/# \1\n\n**Version:** ${VERSION}/" \
            > /tmp/README.md

          pandoc /tmp/README.md -f gfm -t html -s --self-contained -o build/$PACKAGE/README.html

          cp LICENSE build/$PACKAGE/
          cp build/app/outputs/flutter-apk/app-release.apk build/$PACKAGE/pia-wireguard-cfga.apk
          cp build/app/outputs/flutter-apk/app-release.apk.sha1 build/$PACKAGE/pia-wireguard-cfga.sha1

      - name: Create ZIP
        run: |
          ADDON="${{ github.event.repository.name }}"
          cd build
          zip -r "$PACKAGE-${GITHUB_REF_NAME}.zip" "$PACKAGE"

      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run completed -- no release was created."

      - name: Upload release asset
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          files: build/${{ github.event.repository.name }}-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
