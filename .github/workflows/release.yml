name: Package Addon

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without creating a release"
        required: false
        default: "false"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required for full git history

      # 1. SET UP JAVA (Required for Android/Flutter builds)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # 2. SET UP FLUTTER
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # 3. GET DEPENDENCIES & BUILD THE APK
      - name: Build Flutter APK
        run: |
          flutter pub get
          flutter build apk --release

      # 4. INSTALL PANDOC
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      # 5. CREATE STAGING DIRECTORY & GENERATE HTML
      - name: Create addon directory and assets
        run: |
          ADDON="${{ github.event.repository.name }}"
          mkdir -p build/$ADDON

          # Generate the HTML documentation directly into the target folder
          pandoc README.md -f gfm -t html -s --self-contained -o build/$ADDON/README.html

          # Copy standard repository project files
          cp LICENSE build/$ADDON/
          cp README.md build/$ADDON/

          # Copy the compiled APK and checksum files from Flutter's build output
          cp build/app/outputs/flutter-apk/app-release.apk build/$ADDON/pia-wireguard-cfga-release.apk
          cp build/app/outputs/flutter-apk/app-release.apk.sha1 build/$ADDON/pia-wireguard-cfga-release.sha1

      # 6. CREATE ZIP ARCHIVE
      - name: Create ZIP
        run: |
          ADDON="${{ github.event.repository.name }}"
          cd build
          zip -r "$ADDON-${GITHUB_REF_NAME}.zip" "$ADDON"

      # 7. DRY RUN NOTICE
      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run completed — no release was created."

      # 8. UPLOAD TO GITHUB RELEASES
      - name: Upload Release Asset
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ github.event.repository.name }}-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
