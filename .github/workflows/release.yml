name: "Build and release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without creating a release"
        required: false
        default: "true" # Defaulting to true — manual runs are dry by default for safety

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Build and release

    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    permissions:
      contents: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2.23.0
        with:
          channel: "stable"
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then echo "Missing KEYSTORE_BASE64" && exit 1; fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/release.jks
          cat > android/key.properties <<EOF
          storeFile=../release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build Flutter APK
        run: |
          flutter pub get --enforce-lockfile
          dart run flutter_launcher_icons
          flutter build apk --release

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: pia-wireguard-cfga-sbom.spdx.json

      - name: Attest release APK
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: build/app/outputs/flutter-apk/app-release.apk

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Create release package
        run: |
          PACKAGE="${{ github.event.repository.name }}"
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p build/$PACKAGE

          # Strip badges and inject version under the README.html title
          grep -v 'img.shields.io\|sonarcloud.io/api/project_badges' README.md \
            | sed "s/^# \(.*\)/# \1\n\n**Version:** ${VERSION}/" \
            > /tmp/README.md

          # --embed-resources replaces the deprecated --self-contained flag (Pandoc 3.x+)
          pandoc /tmp/README.md -f gfm -t html -s --embed-resources --standalone -o build/$PACKAGE/README.html

          cp LICENSE build/$PACKAGE/
          cp build/app/outputs/flutter-apk/app-release.apk build/$PACKAGE/pia-wireguard-cfga.apk

          # Generate SHA1 explicitly — Flutter does not produce a .sha1 file automatically
          sha1sum build/app/outputs/flutter-apk/app-release.apk | awk '{print $1}' > build/$PACKAGE/pia-wireguard-cfga.sha1

      - name: Create ZIP
        run: |
          PACKAGE="${{ github.event.repository.name }}"
          cd build
          zip -r "$PACKAGE-${GITHUB_REF_NAME}.zip" "$PACKAGE"

      # provides little value?
      #      - name: Attest release ZIP
      #        uses: actions/attest-build-provenance@v2
      #        with:
      #          subject-path: build/${{ github.event.repository.name }}-${{ github.ref_name }}.zip

      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run completed -- no release was created."

      - name: Upload release asset
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            build/${{ github.event.repository.name }}-${{ github.ref_name }}.zip
            build/app/outputs/flutter-apk/app-release.apk
            pia-wireguard-cfga-sbom.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
