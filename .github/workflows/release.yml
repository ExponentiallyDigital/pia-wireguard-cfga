name: "Build and release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without creating a release"
        required: false
        default: "true" # Defaulting to true — manual runs are dry by default for safety

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Build and release

    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    permissions:
      contents: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2.23.0
        with:
          channel: "stable"
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then echo "Missing KEYSTORE_BASE64" && exit 1; fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/release.jks
          cat > android/key.properties <<EOF
          storeFile=../release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK
        run: |
          flutter pub get --enforce-lockfile
          dart run flutter_launcher_icons
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/pia_wireguard_cfga-${GITHUB_REF_NAME}_release.apk

      - name: Build debug APK
        run: |
          flutter build apk --debug
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/pia_wireguard_cfga-${GITHUB_REF_NAME}_debug.apk

      - name: Build AAB
        run: |
          flutter build appbundle --release
          mv build/app/outputs/bundle/release/pia_wireguard_cfga-release.aab \
             build/pia_wireguard_cfga-${GITHUB_REF_NAME}_google-play-store.aab

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: pia-wireguard-cfga-sbom.spdx.json

      - name: Rename SBOM
        run: |
          mv pia-wireguard-cfga-sbom.spdx.json \
             pia-wireguard-cfga-${GITHUB_REF_NAME}_sbom.spdx.json

      - name: Attest release APK
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: build/pia_wireguard_cfga-${{ github.ref_name }}_release.apk

      - name: Attest debug APK
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: build/pia_wireguard_cfga-${{ github.ref_name }}_debug.apk

      - name: Attest AAB
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: build/pia_wireguard_cfga-${{ github.ref_name }}_google-play-store.aab

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Prepare release assets
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Strip badges and inject version under the README.html title
          grep -v 'img.shields.io\|sonarcloud.io/api/project_badges' README.md \
            | sed "s/^# \(.*\)/# \1\n\n**Version:** ${VERSION}/" \
            > /tmp/README.md

          # --embed-resources replaces the deprecated --self-contained flag (Pandoc 3.x+)
          pandoc /tmp/README.md -f gfm -t html -s --embed-resources --standalone -o build/README.html

          cp LICENSE build/LICENSE

      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run completed -- no release was created."

      - name: Upload release assets
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            build/README.html
            build/LICENSE
            build/pia_wireguard_cfga-${{ github.ref_name }}_release.apk
            build/pia_wireguard_cfga-${{ github.ref_name }}_debug.apk
            build/pia_wireguard_cfga-${{ github.ref_name }}_google-play-store.aab
            pia-wireguard-cfga-${{ github.ref_name }}_sbom.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
